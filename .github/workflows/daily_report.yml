name: Daily Report Screenshot & LINE Push

on:
  schedule:
    # Runs at 04:00 UTC (9:30 AM IST) every day
    - cron: '0 4 * * *'
  workflow_dispatch: # This allows you to run it manually for testing

jobs:
  screenshot_and_send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/checkout@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install puppeteer axios form-data

      - name: Run Screenshot Script
        env:
          SITE_URL: 'https://luharaadil.github.io/Scrap-and-RN-generation-daily-records-V2/'
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        run: node scripts/report.js
