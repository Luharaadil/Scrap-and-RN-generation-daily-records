name: Daily Report Screenshot & LINE Push

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  screenshot_and_send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install puppeteer axios form-data

      - name: Run Screenshot Script
        env:
          SITE_URL: 'https://luharaadil.github.io/Scrap-and-RN-generation-daily-records/'
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
        run: node scripts/report.cjs
